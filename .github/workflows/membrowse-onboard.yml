name: Onboard to Membrowse

on:
  workflow_dispatch:
    inputs:
      num_commits:
        description: 'Number of commits to process'
        required: true
        default: '100'
        type: string

jobs:
  load-targets:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load target matrix
        id: set-matrix
        run: echo "matrix=$(jq -c '.' .github/membrowse-targets.json)" >> $GITHUB_OUTPUT

  onboard:
    needs: load-targets
    runs-on: ubuntu-22.04
    container: espressif/idf:release-v5.5
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-targets.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Download libssh source
        shell: bash
        run: |
          . ${IDF_PATH}/export.sh
          cd libssh && ./install.sh
          # Store libssh source outside repo to survive git checkouts
          LIBSSH_DIR=$(ls -d libssh-* | head -1)
          mv "$LIBSSH_DIR" /tmp/libssh-source
          echo "LIBSSH_SOURCE=/tmp/libssh-source" >> $GITHUB_ENV
          echo "Downloaded libssh: $LIBSSH_DIR"

      - name: Create build script
        run: |
          cat > /tmp/build.sh << 'EOF'
          #!/bin/bash
          set -e
          . ${IDF_PATH}/export.sh
          if [ ! -d "libssh/examples/$1" ]; then
            echo "Example $1 not found in this commit, skipping"
            exit 0
          fi
          # Detect expected libssh version from CMakeLists.txt
          EXPECTED_VERSION=$(grep 'set(LIBSSH_VERSION' libssh/CMakeLists.txt | sed 's/.*"\(.*\)".*/\1/')
          EXPECTED_DIR="libssh-${EXPECTED_VERSION}"
          # Create symlink with expected name pointing to downloaded source
          ln -sfn "$LIBSSH_SOURCE" "libssh/${EXPECTED_DIR}"
          cd libssh/examples/$1
          idf.py build
          EOF
          chmod +x /tmp/build.sh

      - name: Setup Python path for action compatibility
        run: |
          # actions/setup-python expects Python at /__t/Python/*/x64/bin/
          # Create symlink structure pointing to container's Python
          PYTHON_VERSION=$(python3 --version | cut -d' ' -f2)
          mkdir -p "/__t/Python/${PYTHON_VERSION}/x64/bin"
          ln -sf /usr/bin/python3 "/__t/Python/${PYTHON_VERSION}/x64/bin/python"
          ln -sf /usr/bin/python3 "/__t/Python/${PYTHON_VERSION}/x64/bin/python3"
          ln -sf /usr/bin/pip3 "/__t/Python/${PYTHON_VERSION}/x64/bin/pip"
          ln -sf /usr/bin/pip3 "/__t/Python/${PYTHON_VERSION}/x64/bin/pip3"

      - name: Run Membrowse Onboard Action
        env:
          LIBSSH_SOURCE: ${{ env.LIBSSH_SOURCE }}
        uses: membrowse/membrowse-action/onboard-action@v1
        with:
          target_name: ${{ matrix.target_name }}
          num_commits: ${{ github.event.inputs.num_commits }}
          build_script: /tmp/build.sh ${{ matrix.board }}
          elf: ${{ matrix.elf }}
          ld: ${{ matrix.ld }}
          linker_vars: ${{ matrix.linker_vars }}
          api_key: ${{ secrets.MEMBROWSE_API_KEY }}
          api_url: ${{ vars.MEMBROWSE_API_URL }}
