name: Membrowse Memory Report

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  load-targets:
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Load target matrix
        id: set-matrix
        run: echo "matrix=$(jq -c '.' .github/membrowse-targets.json)" >> $GITHUB_OUTPUT

  analyze:
    needs: load-targets
    runs-on: ubuntu-22.04
    container: espressif/idf:release-v5.5
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-targets.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup and build
        shell: bash
        run: |
          for i in 1 2 3; do
            ${{ matrix.setup_cmd }} && break
            echo "Setup attempt $i failed, retrying..."
            sleep 5
          done
          ${{ matrix.build_cmd }}

      # ESP-IDF container lacks pip and enforces PEP 668; install pip
      # and allow system-wide packages so membrowse-action can run.
      - name: Setup pip in container
        run: |
          apt-get update && apt-get install -y python3-pip
          python3 -m pip config set global.break-system-packages true

      - name: Run Membrowse Analysis
        continue-on-error: true
        uses: membrowse/membrowse-action@v1
        with:
          target_name: ${{ matrix.target_name }}
          elf: ${{ matrix.elf }}
          map_file: ${{ matrix.map }}
          ld: ${{ matrix.ld }}
          linker_vars: ${{ matrix.linker_vars }}
          api_key: ${{ secrets.MEMBROWSE_API_KEY }}
          api_url: ${{ vars.MEMBROWSE_API_URL }}
          verbose: INFO
